name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - name: nix flake check
        run: nix flake check --print-build-logs

      - name: nix build .#senpi
        run: nix build .#senpi --print-build-logs

      - name: Verify binary
        run: |
          test -x ./result/bin/senpi
          test -L ./result/bin/pi
          ./result/bin/senpi --version
