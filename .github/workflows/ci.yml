name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0

      - uses: DeterminateSystems/nix-installer-action@00199f951aeb9404028a6e4b95ad42546f73296a # main

      - name: nix flake check
        run: nix flake check --print-build-logs

      - name: nix build .#senpi
        run: nix build .#senpi --print-build-logs

      - name: Verify binary
        run: |
          set -euo pipefail
          test -x ./result/bin/senpi
          test -L ./result/bin/pi
          expected="$(jq -r '.version' hashes.json)"
          actual="$(./result/bin/senpi --version 2>&1)"
          if [ "$actual" != "$expected" ]; then
            echo "Version mismatch: expected '$expected', got '$actual'" >&2
            exit 1
          fi
          ./result/bin/senpi --help 2>&1 | grep -qi 'senpi'
